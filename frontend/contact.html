  <main class="contact-content">
    <div class="GetinTouchform">
      <h2>Get in Touch</h2>
      <form>
        <div class="input-group"><label for="name">Your Name</label><input id="name" name="name" type="text" placeholder="Enter your full name" required></div>
        <div class="input-group"><label for="email">Email Address</label><input id="email" name="email" type="email" placeholder="you@example.com" required></div>
        <div class="input-group"><label for="tel">Phone Number</label><input id="tel" name="tel" type="tel" placeholder="+233 ..." required></div>
        <div class="input-group"><label for="message">Message</label><textarea id="message" name="message" placeholder="Tell us how we can help" rows="4"></textarea></div>
        <div class="button-row">
            <button onclick="alert('Sent Successfully')">Send Message</button>
        </div>
      </form>
    </div>
  </main>
